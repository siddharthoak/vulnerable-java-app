name: Security Scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for codeql-action/upload-sarif
  issues: write            # required for PR comments via github-script
  pull-requests: write

jobs:
  security-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 8 (temurin) — build compat for Java 7 source target ───────
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # ── 3. Cache Maven local repository ───────────────────────────────────
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 4. Build ───────────────────────────────────────────────────────────
      - name: Build with Maven
        run: mvn clean install -DskipTests --batch-mode --no-transfer-progress

      # ── 5. OWASP Dependency-Check ──────────────────────────────────────────
      # Produces HTML, JSON, and SARIF reports in dependency-check-report/.
      # Fails the build if any finding has CVSS >= 7.
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'vulnerable-java-app'
          path: '.'
          format: 'HTML JSON SARIF'
          out: 'dependency-check-report'
          args: >
            --failOnCVSS 7
            --suppression dependency-check-suppression.xml
            --enableRetired

      # ── 6a. Trivy — console table (informational, no fail) ─────────────────
      - name: Trivy — console summary
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      # ── 6b. Trivy — JSON report (fails on CRITICAL or HIGH) ────────────────
      - name: Trivy — JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: json
          output: trivy-report.json
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # ── 7. Grype ──────────────────────────────────────────────────────────
      - name: Grype scan
        if: always()
        uses: anchore/scan-action@v4
        with:
          path: '.'
          fail-build: 'true'
          severity-cutoff: high
          output-file: grype-report.json
          output-format: json

      # ── 8. Upload all reports as a single artifact ─────────────────────────
      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: |
            dependency-check-report/dependency-check-report.html
            dependency-check-report/dependency-check-report.json
            dependency-check-report/dependency-check-report.sarif
            trivy-report.json
            grype-report.json
          if-no-files-found: warn

      # ── 9. Upload Dependency-Check SARIF to GitHub Code Scanning ──────────
      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-report/dependency-check-report.sarif
          category: dependency-check

      # ── 10. Post PR comment with scanner summary ───────────────────────────
      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function countSeverities(items, severityKey) {
              const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
              for (const item of (items || [])) {
                const raw = (typeof item === 'string' ? item : item[severityKey]) || '';
                const sev = raw.toUpperCase();
                if (sev in counts) counts[sev]++;
              }
              return counts;
            }

            function statusEmoji(counts) {
              if (counts.CRITICAL > 0) return '❌ CRITICAL';
              if (counts.HIGH > 0)     return '🔴 HIGH';
              if (counts.MEDIUM > 0)   return '🟡 MEDIUM';
              return '✅ Clean';
            }

            // ── Trivy ──────────────────────────────────────────────────────
            let trivyCounts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
            let trivyStatus = '⚠️ Report unavailable';
            try {
              const report = JSON.parse(fs.readFileSync('trivy-report.json', 'utf8'));
              const vulns = (report.Results || []).flatMap(r => r.Vulnerabilities || []);
              trivyCounts = countSeverities(vulns, 'Severity');
              trivyStatus = statusEmoji(trivyCounts);
            } catch (e) {
              console.log('Could not read trivy-report.json:', e.message);
            }

            // ── Grype ──────────────────────────────────────────────────────
            let grypeCounts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
            let grypeStatus = '⚠️ Report unavailable';
            try {
              const report = JSON.parse(fs.readFileSync('grype-report.json', 'utf8'));
              const severities = (report.matches || []).map(
                m => m.vulnerability && m.vulnerability.severity
              );
              grypeCounts = countSeverities(severities, null);
              grypeStatus = statusEmoji(grypeCounts);
            } catch (e) {
              console.log('Could not read grype-report.json:', e.message);
            }

            const totalCritical = trivyCounts.CRITICAL + grypeCounts.CRITICAL;
            const totalHigh     = trivyCounts.HIGH     + grypeCounts.HIGH;
            const overallBadge  = totalCritical > 0 ? '❌' : totalHigh > 0 ? '🔴' : '✅';

            const body = `## ${overallBadge} Vulnerability Scan Results

            | Scanner | Critical | High | Medium | Low | Status |
            |---------|:--------:|:----:|:------:|:---:|--------|
            | OWASP Dependency-Check | — | — | — | — | See artifact |
            | Trivy | **${trivyCounts.CRITICAL}** | **${trivyCounts.HIGH}** | ${trivyCounts.MEDIUM} | ${trivyCounts.LOW} | ${trivyStatus} |
            | Grype | **${grypeCounts.CRITICAL}** | **${grypeCounts.HIGH}** | ${grypeCounts.MEDIUM} | ${grypeCounts.LOW} | ${grypeStatus} |

            > 📦 Full reports (HTML, JSON, SARIF) are available in the **[vulnerability-reports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})** artifact.
            > OWASP Dependency-Check counts are in the downloaded artifact — the JSON is too large to parse inline.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.replace(/^            /gm, ''),
            });
