name: Security Scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for codeql-action/upload-sarif
  issues: write            # required for PR comments via github-script
  pull-requests: write

jobs:
  security-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      # -- 1. Checkout -----------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -- 2. Java 8 (temurin) ---------------------------------------------------
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # -- 3. Cache Maven local repository ---------------------------------------
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -- 4. Build --------------------------------------------------------------
      - name: Build with Maven
        run: mvn clean install -DskipTests --batch-mode --no-transfer-progress

      # -- 5. Trivy -- console table (informational, no fail) --------------------
      - name: Trivy -- console summary
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      # -- 6. Trivy -- JSON report (fails on CRITICAL or HIGH) ------------------
      - name: Trivy -- JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: json
          output: trivy-report.json
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # -- 7. Trivy -- SARIF for GitHub Code Scanning ----------------------------
      - name: Trivy -- SARIF report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-report.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # -- 8. Grype --------------------------------------------------------------
      # anchore/scan-action@v4 dropped the output-file parameter, so there is no
      # way to write JSON to a known path via the action. Running the Grype CLI
      # directly gives full control: fresh DB via `grype db update`, JSON written
      # to grype-report.json, and continue-on-error so a high-severity exit (1)
      # does not skip the upload step.
      - name: Install Grype and update DB
        if: always()
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype db update

      - name: Grype scan
        if: always()
        continue-on-error: true
        run: grype dir:. -o json --file grype-report.json --fail-on high

      # -- 10. Upload all reports as a single artifact ---------------------------
      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: |
            trivy-report.json
            grype-report.json
          if-no-files-found: warn

      # -- 11. Upload Trivy SARIF to GitHub Code Scanning -----------------------
      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles('trivy-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif
          category: trivy

      # -- 12. Post PR comment with scanner summary ------------------------------
      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function countSeverities(items, severityKey) {
              const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
              for (const item of (items || [])) {
                const raw = (typeof item === 'string' ? item : item[severityKey]) || '';
                const sev = raw.toUpperCase();
                if (sev in counts) counts[sev]++;
              }
              return counts;
            }

            function statusEmoji(counts) {
              if (counts.CRITICAL > 0) return '❌ CRITICAL';
              if (counts.HIGH > 0)     return '🔴 HIGH';
              if (counts.MEDIUM > 0)   return '🟡 MEDIUM';
              return '✅ Clean';
            }

            // -- Trivy -----------------------------------------------------------
            let trivyCounts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
            let trivyStatus = '⚠️ Report unavailable';
            try {
              const report = JSON.parse(fs.readFileSync('trivy-report.json', 'utf8'));
              const vulns = (report.Results || []).flatMap(r => r.Vulnerabilities || []);
              trivyCounts = countSeverities(vulns, 'Severity');
              trivyStatus = statusEmoji(trivyCounts);
            } catch (e) {
              console.log('Could not read trivy-report.json:', e.message);
            }

            // -- Grype -----------------------------------------------------------
            let grypeCounts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
            let grypeStatus = '⚠️ Report unavailable';
            try {
              const report = JSON.parse(fs.readFileSync('grype-report.json', 'utf8'));
              const severities = (report.matches || []).map(
                m => m.vulnerability && m.vulnerability.severity
              );
              grypeCounts = countSeverities(severities, null);
              grypeStatus = statusEmoji(grypeCounts);
            } catch (e) {
              console.log('Could not read grype-report.json:', e.message);
            }

            const totalCritical = trivyCounts.CRITICAL + grypeCounts.CRITICAL;
            const totalHigh     = trivyCounts.HIGH     + grypeCounts.HIGH;
            const overallBadge  = totalCritical > 0 ? '❌' : totalHigh > 0 ? '🔴' : '✅';

            const body = `## ${overallBadge} Vulnerability Scan Results

            | Scanner | Critical | High | Medium | Low | Status |
            |---------|:--------:|:----:|:------:|:---:|--------|
            | Trivy | **${trivyCounts.CRITICAL}** | **${trivyCounts.HIGH}** | ${trivyCounts.MEDIUM} | ${trivyCounts.LOW} | ${trivyStatus} |
            | Grype | **${grypeCounts.CRITICAL}** | **${grypeCounts.HIGH}** | ${grypeCounts.MEDIUM} | ${grypeCounts.LOW} | ${grypeStatus} |

            > 📦 Full reports (JSON) are available in the **[vulnerability-reports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})** artifact.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.replace(/^            /gm, ''),
            });
