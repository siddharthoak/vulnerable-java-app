name: Security Scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for codeql-action/upload-sarif
  issues: write            # required for PR comments via github-script
  pull-requests: write

jobs:
  security-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      # -- 1. Checkout -----------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -- 2. Java 8 (temurin) ---------------------------------------------------
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # -- 3. Date (used for OWASP DC cache key daily rotation) ------------------
      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # -- 4. Cache Maven local repository ---------------------------------------
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -- 5. Build --------------------------------------------------------------
      - name: Build with Maven
        run: mvn clean install -DskipTests --batch-mode --no-transfer-progress

      # -- 6. Cache OWASP DC NVD data --------------------------------------------
      # Rotates daily so vulnerability data stays fresh without re-downloading
      # the full NVD feed on every run.
      - name: Cache OWASP DC data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: owasp-dc-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: owasp-dc-${{ runner.os }}-

      # -- 7. OWASP Dependency-Check (Maven plugin) ------------------------------
      # Previously used dependency-check/Dependency-Check_Action (Docker-based).
      # That action inherits the host runner's JAVA_HOME via `-e "JAVA_HOME"` in
      # the docker run call, but the host path does not exist inside the container,
      # causing "JAVA_HOME is not defined correctly". Switching to the Maven plugin
      # avoids the Docker layer entirely: it runs in-process using the Java already
      # installed by setup-java above.
      #
      # continue-on-error: true so that a CVE-triggered non-zero exit (CVSS >= 7)
      # does not skip the Trivy/Grype steps that follow.
      - name: OWASP Dependency-Check
        continue-on-error: true
        run: |
          mvn --batch-mode --no-transfer-progress \
            org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML,JSON,SARIF \
            -DoutputDirectory=dependency-check-report \
            -DsuppressionFile=dependency-check-suppression.xml \
            -DenableRetired=true

      # -- 8a. Trivy -- console table (informational, no fail) -------------------
      - name: Trivy -- console summary
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      # -- 8b. Trivy -- JSON report (fails on CRITICAL or HIGH) ------------------
      - name: Trivy -- JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: json
          output: trivy-report.json
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # -- 9. Clear stale Grype DB -----------------------------------------------
      # anchore/scan-action uses cache-db: true by default, keyed by DB schema
      # version (not by date). Once restored, a DB older than 5 days causes Grype
      # to abort with "the vulnerability database was built N weeks ago". Deleting
      # ~/.cache/grype before the scan forces a fresh download every run.
      - name: Clear stale Grype DB cache
        if: always()
        run: rm -rf ~/.cache/grype

      # -- 10. Grype -------------------------------------------------------------
      - name: Grype scan
        if: always()
        uses: anchore/scan-action@v4
        with:
          path: '.'
          fail-build: 'true'
          severity-cutoff: high
          output-file: grype-report.json
          output-format: json
          cache-db: false

      # -- 11. Upload all reports as a single artifact ---------------------------
      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: |
            dependency-check-report/dependency-check-report.html
            dependency-check-report/dependency-check-report.json
            dependency-check-report/dependency-check-report.sarif
            trivy-report.json
            grype-report.json
          if-no-files-found: warn

      # -- 12. Upload Dependency-Check SARIF to GitHub Code Scanning -------------
      # Guarded with hashFiles so the step is silently skipped when the OWASP DC
      # step did not produce the SARIF file (e.g. scan aborted before reporting).
      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles('dependency-check-report/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-report/dependency-check-report.sarif
          category: dependency-check

      # -- 13. Post PR comment with scanner summary ------------------------------
      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function countSeverities(items, severityKey) {
              const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
              for (const item of (items || [])) {
                const raw = (typeof item === 'string' ? item : item[severityKey]) || '';
                const sev = raw.toUpperCase();
                if (sev in counts) counts[sev]++;
              }
              return counts;
            }

            function statusEmoji(counts) {
              if (counts.CRITICAL > 0) return '❌ CRITICAL';
              if (counts.HIGH > 0)     return '🔴 HIGH';
              if (counts.MEDIUM > 0)   return '🟡 MEDIUM';
              return '✅ Clean';
            }

            // -- Trivy -----------------------------------------------------------
            let trivyCounts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
            let trivyStatus = '⚠️ Report unavailable';
            try {
              const report = JSON.parse(fs.readFileSync('trivy-report.json', 'utf8'));
              const vulns = (report.Results || []).flatMap(r => r.Vulnerabilities || []);
              trivyCounts = countSeverities(vulns, 'Severity');
              trivyStatus = statusEmoji(trivyCounts);
            } catch (e) {
              console.log('Could not read trivy-report.json:', e.message);
            }

            // -- Grype -----------------------------------------------------------
            let grypeCounts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
            let grypeStatus = '⚠️ Report unavailable';
            try {
              const report = JSON.parse(fs.readFileSync('grype-report.json', 'utf8'));
              const severities = (report.matches || []).map(
                m => m.vulnerability && m.vulnerability.severity
              );
              grypeCounts = countSeverities(severities, null);
              grypeStatus = statusEmoji(grypeCounts);
            } catch (e) {
              console.log('Could not read grype-report.json:', e.message);
            }

            const totalCritical = trivyCounts.CRITICAL + grypeCounts.CRITICAL;
            const totalHigh     = trivyCounts.HIGH     + grypeCounts.HIGH;
            const overallBadge  = totalCritical > 0 ? '❌' : totalHigh > 0 ? '🔴' : '✅';

            const body = `## ${overallBadge} Vulnerability Scan Results

            | Scanner | Critical | High | Medium | Low | Status |
            |---------|:--------:|:----:|:------:|:---:|--------|
            | OWASP Dependency-Check | -- | -- | -- | -- | See artifact |
            | Trivy | **${trivyCounts.CRITICAL}** | **${trivyCounts.HIGH}** | ${trivyCounts.MEDIUM} | ${trivyCounts.LOW} | ${trivyStatus} |
            | Grype | **${grypeCounts.CRITICAL}** | **${grypeCounts.HIGH}** | ${grypeCounts.MEDIUM} | ${grypeCounts.LOW} | ${grypeStatus} |

            > 📦 Full reports (HTML, JSON, SARIF) are available in the **[vulnerability-reports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})** artifact.
            > OWASP Dependency-Check counts are in the downloaded artifact -- the JSON is too large to parse inline.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.replace(/^            /gm, ''),
            });
